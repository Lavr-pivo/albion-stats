<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Albion Market — Перепродажи</title>
<link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div class="wrap">
  <div class="page-head">
    <div class="kicker">Поиск выгоды</div>
    <h1>Выгодные перепродажи</h1>
    <p>Где купить дешевле и продать дороже между городами. Учитываются налог и комиссия.</p>
  </div>

  <div class="card">
    <div class="row">
      <div class="field"><label>Качество</label>
        <select id="quality"><option value="1">Обычное</option><option value="2">Хорошее</option><option value="3">Незаурядное</option><option value="4">Отличное</option><option value="5">Шедевр</option></select>
      </div>
      <div class="field"><label>Свежесть данных</label>
        <select id="maxAge"><option value="6">до 6 ч</option><option value="12" selected>до 12 ч</option><option value="24">до 24 ч</option><option value="72">до 3 дн</option></select>
      </div>
      <div class="field"><label>Мин. прибыль</label>
        <input id="minProfit" type="number" value="5000" style="width:120px" />
      </div>
      <div class="field"><label>Макс. ROI (×)</label>
        <input id="maxRoi" type="number" value="10" step="0.5" style="width:100px" />
      </div>
      <div class="field"><label>&nbsp;</label>
        <label class="toggle"><input id="premium" type="checkbox" checked /> Премиум (налог 4%)</label>
      </div>
      <div class="field"><label>&nbsp;</label>
        <button class="btn btn-primary" id="go">Найти</button>
      </div>
    </div>
  </div>

  <div class="note">
    Данные краудсорсовые: попадаются устаревшие и единичные «троллинг»-цены.
    Фильтры свежести и макс. ROI отсекают самое явное, но перед сделкой проверяй цену в игре.
  </div>

  <div id="result"></div>
</div>
<script type="module" src="/js/flips.js"></script>
</body>
</html>
